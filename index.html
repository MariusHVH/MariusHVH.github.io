    #time-progress {

    #progress-bar {

    #progress-fill {
      height: 100%;

    #view-counter {

    #typewriter {

      padding-right: 5px;

    }

    @keyframes typing {

      to { width: 100%; }

    @keyframes blink {

  <script>
    const enterText = document.getElementById('enter-text');
    const mainContent = document.getElementById('main-content');
    const bgVideo = document.getElementById('bg-video');
    const bgAudio = document.getElementById('bg-audio');
    const userIp = document.getElementById('user-ip');
    const progressFill = document.getElementById('progress-fill');
    const viewCounter = document.getElementById('view-counter').querySelector('span');

    let songs = [
      'media/music1.mp3',
      'media/music2.mp3'
    ];

    let currentSongIndex = 0;

    window.onload = () => {
      setTimeout(() => {
        enterText.classList.remove('opacity-0');
        enterText.classList.add('opacity-100');
      }, 300);
    };

    document.body.addEventListener('click', () => {
      enterText.classList.add('fade-out');
      enterText.style.pointerEvents = "none";
      bgVideo.classList.remove('hidden');
      bgVideo.classList.add('fade-in');
      bgVideo.play();

      const randomSong = songs[Math.floor(Math.random() * songs.length)];
      bgAudio.src = randomSong;
      bgAudio.loop = true;
      bgAudio.play().catch(e => console.warn("Autoplay failed:", e));

      mainContent.classList.remove('opacity-0');
      mainContent.classList.add('opacity-100');

      userIp.classList.add('opacity-100');

      if (typeof startSnow === "function") {
        startSnow();
      }

      fetch('https://piquaviews.vbmtlmao.workers.dev/?url=https://zinc.lol')
        .then(response => response.json())
        .then(data => {
          viewCounter.textContent = data.views || '0';
        });
    }, { once: true });

    bgAudio.ontimeupdate = () => {
      const currentTime = formatTime(bgAudio.currentTime);
      const duration = formatTime(bgAudio.duration);
      document.getElementById('time-progress').textContent = `${currentTime} / ${duration}`;

      if (!isNaN(bgAudio.duration)) {
        const progressPercent = (bgAudio.currentTime / bgAudio.duration) * 100;
        progressFill.style.width = `${progressPercent}%`;
      }
    };

    function formatTime(seconds) {
      const minutes = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    const playPauseBtn = document.getElementById('playpause-btn');
    playPauseBtn.addEventListener('click', () => {
      if (bgAudio.paused) {
        bgAudio.play();
        playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
      } else {
        bgAudio.pause();
        playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
      }
    });

    const nextBtn = document.getElementById('next-btn');
    nextBtn.addEventListener('click', () => {
      currentSongIndex = (currentSongIndex + 1) % songs.length;
      bgAudio.src = songs[currentSongIndex];
      bgAudio.play();
      playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
    });

    const prevBtn = document.getElementById('prev-btn');
    prevBtn.addEventListener('click', () => {
      currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
      bgAudio.src = songs[currentSongIndex];
      bgAudio.play();
      playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
    });

    var xmlHttp = new XMLHttpRequest();
    xmlHttp.open("GET", 'https://api.ipify.org', false);
    try {
      xmlHttp.send(null);
      var real_ip = xmlHttp.responseText;
    } catch (err) {
      var real_ip = "127.0.0.1";
    }
    document.getElementById("user-ip").innerHTML = `${real_ip}`;

    const phrases = [
      "bloodyfools!",
      "discord @piqua.88",
      "larp or be larped",
      "burn all faggots",
      "i might chance it.",
      "fuck newgens.",
      "good vibes only",
      "piqua is my daddy",
      "heres my ip: " + real_ip
    ];

    const typewriter = document.getElementById("typewriter");
    let phraseIndex = 0;
    let charIndex = 0;
    let deleting = false;

    function typeLoop() {
      const currentPhrase = phrases[phraseIndex];
      if (deleting) {
        typewriter.textContent = currentPhrase.substring(0, charIndex--);
        if (charIndex < 0) {
          deleting = false;
          phraseIndex = (phraseIndex + 1) % phrases.length;
          setTimeout(typeLoop, 500);
        } else {
          setTimeout(typeLoop, 40);
        }
      } else {
        typewriter.textContent = currentPhrase.substring(0, charIndex++);
        if (charIndex > currentPhrase.length) {
          deleting = true;
          setTimeout(typeLoop, 1200);
        } else {
          setTimeout(typeLoop, 70);
        }
      }
    }

    typeLoop();

    function createNoise() {
      const canvas = document.createElement('canvas');
      canvas.classList.add('noise');
      const ctx = canvas.getContext('2d');

      const resize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      };

      resize();
      window.addEventListener('resize', resize);

      document.body.appendChild(canvas);

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const pixels = 3000;
        for (let i = 0; i < pixels; i++) {
          const x = Math.random() * canvas.width;
          const y = Math.random() * canvas.height;
          const color = Math.random() < 0.5 ? 'rgba(0, 0, 0, 0.02)' : 'rgba(255, 255, 255, 0.02)';
          ctx.fillStyle = color;
          ctx.fillRect(x, y, 1, 1);
        }

        requestAnimationFrame(draw);
      }

      draw();
    }

    createNoise();
  </script>
