<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Upload Shooting Videos</title>
    <style>
        body { font-family: Arial; background: #111; color: #0f0; padding: 30px; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; background: #0f0; color: #000; border: none; cursor: pointer; }
        #result { margin-top: 20px; font-size: 16px; word-break: break-all; }
    </style>
</head>
<body>
    <h1>Auto Upload to GitHub Pages</h1>
    <p>Select video → Click Upload → Gets direct Discord embed link</p>
    <input type="file" id="vid" accept="video/*" style="margin: 10px;">
    <button onclick="autoUpload()">Upload Video Automatically</button>
    <div id="result"></div>

    <script>
        const TOKEN = "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"; // replace with fresh token if needed
        async function autoUpload() {
            const file = document.getElementById('vid').files[0];
            if (!file) return alert("Select a video first");

            const reader = new FileReader();
            reader.onload = async () => {
                const content = reader.result.split(',')[1];
                const path = `videos/${encodeURIComponent(file.name)}`;
                const url = `https://api.github.com/repos/MariusHVH/MariusHVH.github.io/contents/${path}`;

                try {
                    const res = await fetch(url, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: "auto upload shooting video",
                            content: content,
                            branch: "main"
                        })
                    });

                    const data = await res.json();
                    if (res.ok) {
                        const link = `https://mariusHVH.github.io/${path}`;
                        const domainLink = `https://piqua.top/${path}`;
                        document.getElementById('result').innerHTML = `
                            ✅ Uploaded!<br><br>
                            <strong>Discord Embed Link:</strong><br>
                            <a href="${link}" target="_blank">${link}</a><br><br>
                            <strong>Custom Domain:</strong><br>
                            <a href="${domainLink}" target="_blank">${domainLink}</a><br><br>
                            Post it in Discord - it auto-embeds and plays.
                        `;
                    } else {
                        document.getElementById('result').innerHTML = `Failed: ${data.message || 'Check token/repo'}. Regenerate PAT with repo scope.`;
                    }
                } catch (e) {
                    document.getElementById('result').innerHTML = "Network error. Try again.";
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
