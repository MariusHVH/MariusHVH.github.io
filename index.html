<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTMP3 - YouTube to MP3/MP4</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 40px; }
        .container { max-width: 700px; margin: auto; background: #1f1f1f; padding: 40px; border-radius: 12px; }
        input { width: 85%; padding: 18px; font-size: 18px; border: none; border-radius: 8px; }
        button { padding: 18px 40px; font-size: 18px; background: #ff0000; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        .formats { margin: 25px 0; }
        .result { margin-top: 30px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>YTMP3</h1>
        <h2>Free YouTube to MP3 / MP4 Converter</h2>
        <input type="text" id="url" placeholder="Paste YouTube video link here...">
        <div class="formats">
            <label><input type="radio" name="format" value="mp3" checked> MP3 Audio</label><br><br>
            <label><input type="radio" name="format" value="mp4"> MP4 Video (360p)</label>
        </div>
        <button onclick="convert()">Convert & Download</button>
        <div id="status" class="result"></div>
        <div id="download" class="result"></div>
    </div>

    <script>
        async function convert() {
            const urlInput = document.getElementById('url').value.trim();
            const format = document.querySelector('input[name="format"]:checked').value;
            const status = document.getElementById('status');
            const downloadDiv = document.getElementById('download');
            
            if (!urlInput) {
                status.innerHTML = 'Please paste a YouTube link!';
                return;
            }
            
            status.innerHTML = 'Processing your video... Please wait.';
            downloadDiv.innerHTML = '';
            
            try {
                const response = await fetch('https://ytmp3-backend-hxudonrender.com/convert', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput, format })
                });
                
                const data = await response.json();
                if (data.success) {
                    status.innerHTML = '✅ Ready! Download starting...';
                    downloadDiv.innerHTML = `<a href="${data.downloadUrl}" download style="color:#ff0000; font-size:20px;">📥 Download ${format.toUpperCase()} Now</a>`;
                    window.location.href = data.downloadUrl; // Auto start download
                } else {
                    status.innerHTML = '❌ Error: ' + (data.error || 'Try again');
                }
            } catch (e) {
                status.innerHTML = '❌ Connection error. Check your Render service is running.';
            }
        }
    </script>
</body>
</html>
